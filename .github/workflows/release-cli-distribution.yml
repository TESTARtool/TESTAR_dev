name: TESTAR-CLI distribution

on:
  workflow_dispatch:
  push:
    branches:
      - main_dev
    tags:
      - testar-cli-v*

jobs:
  build-cli-distribution:
    name: Build testar-cli distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out the TESTAR_dev repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build testar-cli distribution
        run: ./gradlew :cli:cliDistribution -x test

      - name: Upload testar-cli zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: testar-cli-distribution
          path: cli/target/distributions/testar-cli.zip
          if-no-files-found: error

      - name: Publish testar-cli release asset
        if: startsWith(github.ref, 'refs/tags/testar-cli-v')
        uses: softprops/action-gh-release@v2
        with:
          files: cli/target/distributions/testar-cli.zip
